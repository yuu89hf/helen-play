name: Cloud Build Android APK

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual klik tombol

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Build Script and Assemble APK
        run: |
          gradle init --type basic --dsl kts --incubating
          gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: app/build/outputs/apk/debug/app-debug.apk
